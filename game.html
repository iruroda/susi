<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>몬스터볼 피하기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body {
    height: 100%;
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    color: #e8e8f0;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #stage {
    position: relative;
    overflow: hidden;
    border-radius: 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  canvas {
    display: block;
    touch-action: none;
  }
  .hud {
    position: absolute;
    top: 10px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    font-variant-numeric: tabular-nums;
    z-index: 5;
  }
  .hud .time {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.55);
  }
  .hud .best { font-size: 13px; opacity: 0.8; margin-top: 2px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.55); }

  /* control bar: same width as square stage, 3 separate rectangular buttons */
  #controls {
    position: relative;
    margin-top: 10px;
    display: flex;
    gap: 10px;
  }
  .ctrl-btn {
    flex: 1;
    height: 100%;
    border: none;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 800;
    font-size: clamp(22px, 5.5vw, 36px);
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
    transition: filter 0.08s ease;
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
    overflow: hidden;
    position: relative;
  }
  .dir-btn { background: linear-gradient(180deg, #5cd68a, #2e9e5b); }
  .dir-btn:active, .dir-btn.held { filter: brightness(0.82); }
  .special-btn {
    background: linear-gradient(180deg, #8d8d97, #5c5c66);
    font-size: clamp(13px, 3.3vw, 18px);
    line-height: 1.35;
  }
  .special-btn.ready {
    background: linear-gradient(180deg, #ffe066, #ffb703);
    animation: readyPulse 1s ease-in-out infinite;
  }
  .special-btn:active, .special-btn.held { filter: brightness(0.85); }
  @keyframes readyPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.25); }
  }
  .special-btn span { position: relative; z-index: 1; }
  .special-sub { opacity: 0.6; font-size: 0.75em; font-weight: 600; margin-top: 2px; }
  .cd-ring {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    pointer-events: none;
    background: var(--gauge-color, rgba(255,205,40,0.75));
    width: calc(var(--p, 0) * 100%);
    transition: width 0.35s ease, background 0.2s linear;
    overflow: hidden;
  }
  .cd-ring::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 42%;
    background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0));
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(8,8,20,0.82);
    backdrop-filter: blur(3px);
    text-align: center;
    padding: 20px;
    z-index: 10;
  }
  .overlay h1 {
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #ff8b8b, #ffd27a, #ffe98b);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .overlay p { font-size: 14.5px; opacity: 0.9; line-height: 1.7; max-width: 320px; }
  .overlay .score { font-size: 21px; font-weight: 700; }
  .overlay .score b { color: #ffb15c; }
  button.cta {
    margin-top: 4px;
    padding: 12px 30px;
    min-width: 210px;
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    background: linear-gradient(90deg, #ffd27a, #ff9b6a);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(255,160,100,0.4);
  }
  button.cta:active { transform: translateY(1px); }
  #startScreen { background: #0a0a16 url('start3.png') center/cover no-repeat; justify-content: flex-start; padding-top: 33%; padding-bottom: 26px; gap: 14px; }
  .start-title { position: absolute; top: 6%; left: 50%; transform: translateX(-50%); width: 70%; height: auto; pointer-events: none; }
  .start-desc { font-size: 12px; line-height: 1.65; background: rgba(8,8,20,0.6); padding: 9px 13px; border-radius: 10px; max-width: 320px; opacity: 1; text-align: left; margin-top: auto; }
  #gameOverScreen { justify-content: center; gap: 30px; background: rgba(8,8,20,0.5); }
  .go-img { width: 40%; height: auto; margin-bottom: 22px; }
  #gameOverScreen #retryBtn { margin-top: 26px; }
  #gameOverScreen h1 { font-size: clamp(20px, 5vw, 30px); }
  .cta-sub { display: block; font-size: 0.68em; font-weight: 600; opacity: 0.7; margin-top: 3px; }
  #specialMain { font-size: 0.8em; }
  .special-btn.ready { color: #1a1a1a; }
  .hidden { display: none !important; }
  .hint { font-size: 12px; opacity: 0.6; }
  img.preload { display: none; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game"></canvas>

    <div class="hud hidden" id="hud">
      <div class="time" id="timeText">0.0</div>
      <div class="best" id="bestText"></div>
    </div>

    <div class="overlay" id="startScreen">
      <img src="title.png" class="start-title" alt="타이틀">
      <button class="cta" id="startBtn">시작하기<span class="cta-sub">space bar</span></button>
      <p class="start-desc">조작: 좌, 우 방향키, 스페이스바 (터치 가능)<br>
      나무열매를 3개 모으면 필살기 사용 가능!</p>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <img src="gameover.png" class="go-img" alt="게임 오버">
      <h1 id="goHeading">획득!</h1>
      <div class="score">버틴 시간 <b id="finalTime">0.0</b> 초</div>
      <div class="best" id="finalBest"></div>
      <button class="cta" id="retryBtn">다시 도전<span class="cta-sub">space bar</span></button>
    </div>

    <div class="overlay" id="loadingScreen">
      <h1>로딩중...</h1>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn dir-btn" id="leftBtn">◀</button>
    <button class="ctrl-btn special-btn" id="specialBtn">
      <span id="specialMain">나무열매를 모으세요</span>
      <span class="special-sub">space bar</span>
      <div class="cd-ring" id="cdRing" style="--p:0"></div>
    </button>
    <button class="ctrl-btn dir-btn" id="rightBtn">▶</button>
  </div>
</div>

<!-- preload images -->
<img class="preload" id="imgNomoveSrc" src="nomove.png">
<img class="preload" id="imgRun1Src" src="run1.png">
<img class="preload" id="imgRun2Src" src="run2.png">
<img class="preload" id="imgBallSrc" src="ball.png">
<img class="preload" id="imgJamoongSrc" src="jamoong.png">
<img class="preload" id="imgBliSrc" src="bli1.png">
<img class="preload" id="imgBoksungSrc" src="boksung1.png">
<img class="preload" id="imgOrangSrc" src="orang1.png">
<img class="preload" id="imgBgSrc" src="background1.png">
<img class="preload" id="imgGotchaSrc" src="gotcha.png">

<script>
(function () {
  // 우클릭/롱프레스(그림 저장) 컨텍스트 메뉴 비활성화
  document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const hud = document.getElementById('hud');
  const timeText = document.getElementById('timeText');
  const bestText = document.getElementById('bestText');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const loadingScreen = document.getElementById('loadingScreen');
  const finalTime = document.getElementById('finalTime');
  const finalBest = document.getElementById('finalBest');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const controlsEl = document.getElementById('controls');
  const leftBtn = document.getElementById('leftBtn');
  const rightBtn = document.getElementById('rightBtn');
  const specialBtn = document.getElementById('specialBtn');
  const cdRing = document.getElementById('cdRing');
  const specialMain = document.getElementById('specialMain');

  // ---------- image loading ----------
  const imgNomove = document.getElementById('imgNomoveSrc');
  const imgRun1 = document.getElementById('imgRun1Src');
  const imgRun2 = document.getElementById('imgRun2Src');
  const imgBall = document.getElementById('imgBallSrc');
  const imgJamoong = document.getElementById('imgJamoongSrc');
  const imgBli = document.getElementById('imgBliSrc');
  const imgBoksung = document.getElementById('imgBoksungSrc');
  const imgOrang = document.getElementById('imgOrangSrc');
  const imgBg = document.getElementById('imgBgSrc');
  const imgGotcha = document.getElementById('imgGotchaSrc');
  const allImgs = [imgNomove, imgRun1, imgRun2, imgBall, imgJamoong, imgBli, imgBoksung, imgOrang, imgBg, imgGotcha];
  let loadedCount = 0;
  function onImgLoad() {
    loadedCount++;
    if (loadedCount >= allImgs.length) {
      loadingScreen.classList.add('hidden');
      // 로딩이 끝나면 시작화면(startScreen)을 보여준다
    }
  }
  allImgs.forEach(img => {
    if (img.complete && img.naturalWidth) onImgLoad();
    else {
      img.addEventListener('load', onImgLoad);
      img.addEventListener('error', onImgLoad);
    }
  });

  // ---------- player hitbox ellipses (normalized, from *_hitbox.png red zones) ----------
  const HB_NOMOVE = { exW: 0.4172, eyH: 0.5894, rxW: 0.2841, ryH: 0.4076 }; // nomove.png (308x341)
  const HB_RUN    = { exW: 0.5950, eyH: 0.6148, rxW: 0.2775, ryH: 0.3428 }; // run1/run2.png (400x283)
  // collectible fruit hitboxes (normalized circles from each *_hitbox.png)
  const FRUIT_HB = {
    jamoong: { cxW: 0.5008, cyH: 0.5350, rW: 0.4887 }, // jamoong_hitbox.png (666x799)
    bli:     { cxW: 0.5079, cyH: 0.5179, rW: 0.4891 }, // bli1_hitbox.png (1008x1033)
    boksung: { cxW: 0.5022, cyH: 0.5059, rW: 0.4186 }, // boksung1_hitbox.png (897x768)
    orang:   { cxW: 0.5058, cyH: 0.5000, rW: 0.4427 }  // orang1_hitbox.png (772x684)
  };
  const FRUIT_KINDS = Object.keys(FRUIT_HB);
  // collection sparkle color matched to each fruit's dominant color
  const FRUIT_COLOR = {
    jamoong: '255,210,60',  // yellow
    bli:     '150,90,220',  // purple
    boksung: '255,150,175', // pink
    orang:   '70,150,230'   // blue
  };
  function fruitImg(kind) {
    if (kind === 'bli') return imgBli;
    if (kind === 'boksung') return imgBoksung;
    if (kind === 'orang') return imgOrang;
    return imgJamoong;
  }

  // ---------- square stage sizing ----------
  let W = 0, H = 0, DPR = 1;
  const BAR_RATIO = 0.22 * 0.8; // control bar height relative to square width (80% of before)
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const availW = window.innerWidth - 16;
    const availH = window.innerHeight - 16;
    let square = Math.min(availW, availH / (1 + BAR_RATIO));
    square = Math.max(square, 240);
    W = H = Math.floor(square);

    stage.style.width = W + 'px';
    stage.style.height = H + 'px';
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    controlsEl.style.width = W + 'px';
    controlsEl.style.height = Math.floor(W * BAR_RATIO) + 'px';

    layoutSizes();
  }
  window.addEventListener('resize', resize);

  // ---------- player ----------
  const player = {
    x: 0, y: 0,
    targetH: 0,
    speed: 0,
    facing: 'idle',   // 'idle' | 'left' | 'right'
    animFrame: 0,
    animTimer: 0,
    drawW: 0, drawH: 0 // current frame's actual drawn size (aspect preserved)
  };
  const ANIM_INTERVAL = 110; // ms per frame
  let ballSize = 24;
  // fruitVisualR sets how big every fruit is DRAWN (kept identical across kinds).
  // The actual collision radius is fruitVisualR * FRUIT_HITBOX_SCALE, computed
  // separately below, so tuning the hitbox never resizes the artwork.
  let fruitVisualR = 14;
  const FRUIT_HITBOX_SCALE = 1.1; // hitbox is 110% of the drawn art's natural circle

  function layoutSizes() {
    player.targetH = H * 0.20 * 0.8; // 80% size
    player.speed = W * 0.012;
    player.y = H * 0.19; // feet land on the light-green grass just below the trees
    if (player.x === 0) player.x = W / 2;
    const margin = player.targetH * 0.55;
    player.x = Math.max(margin, Math.min(W - margin, player.x));
    ballSize = W * 0.13 * 0.4; // ball diameter (60% smaller than original)
    fruitVisualR = ballSize * 0.53; // same drawn size for every fruit kind
  }

  // ---------- input state ----------
  const keys = {};
  let leftHeld = false, rightHeld = false;

  function bindHoldButton(el, onDown, onUp) {
    const down = (e) => { e.preventDefault(); el.classList.add('held'); onDown(); };
    const up = (e) => { e.preventDefault(); el.classList.remove('held'); onUp(); };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('pointerleave', up);
  }
  bindHoldButton(leftBtn, () => leftHeld = true, () => leftHeld = false);
  bindHoldButton(rightBtn, () => rightHeld = true, () => rightHeld = false);
  specialBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); activateSpecial(); });

  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (['arrowleft','arrowright','arrowup','arrowdown',' '].includes(k) || e.code === 'Space') e.preventDefault();
    keys[k] = true;
    if (e.code === 'Space' && !e.repeat) {
      if (!startScreen.classList.contains('hidden') || !gameOverScreen.classList.contains('hidden')) {
        startGame();          // 시작화면·게임오버 화면에서 스페이스바로 시작
      } else {
        activateSpecial();
      }
    }
  });
  window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function isMovingLeft() { return leftHeld || keys['arrowleft'] || keys['a']; }
  function isMovingRight() { return rightHeld || keys['arrowright'] || keys['d']; }

  // ---------- falling objects (balls + grapes) ----------
  let objects = [];
  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let spawnTimer = 0;
  let best = 0;

  // ---------- special skill (grape gauge) ----------
  const GRAPE_TARGET = 3;
  let grapeCount = 0;
  let specialReady = false;
  let clearFlash = 0;

  function activateSpecial() {
    if (!running || !specialReady) return;
    for (const o of objects) burst(o.x, o.y, '255,255,255', 8);
    objects = [];
    specialReady = false;
    grapeCount = 0;
    clearFlash = 1;
  }

  // ---------- particles ----------
  let particles = [];
  function burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * 5 + 1;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color });
    }
  }

  // ---------- death (gotcha) animation ----------
  let gotchaAnim = null; // { x, y, t }
  const GOTCHA_DURATION = 700;

  // difficulty cycle: interval (~frame units) between spawns.
  // 0~10s ramps from easy to peak; every later 10s cycle dips back to the
  // "5s" level and ramps up to the "10s" peak again, repeating.
  const DIFF_START = 50;
  const DIFF_PEAK = 16;
  const DIFF_MID = 33;
  // Faster balls spend less time on screen, which by itself would shrink the
  // average number visible at once. 1.1 x 1.1 cancels that shrinkage and still
  // nets a true +10% increase in how many balls are on screen at once.
  const SPAWN_RATE_MULT = 1.1 * 1.1;
  // 0 at the "easy" end of each ramp, 1 at the density peak
  function spawnIntensityAt(t) {
    if (t <= 10) return t / 10;
    return ((t - 10) % 10) / 10;
  }
  function spawnIntervalAt(t) {
    const k = spawnIntensityAt(t);
    const base = (t <= 10)
      ? DIFF_START + (DIFF_PEAK - DIFF_START) * k
      : DIFF_MID + (DIFF_PEAK - DIFF_MID) * k;
    return base / SPAWN_RATE_MULT;
  }

  const BALL_SPEED_MULT = 1.1 * 1.2; // +10% then another overall +20% on top
  // extra per-ball speed variety: uniform 0.8x~1.2x, so the fastest possible
  // ball reaches 120% of the baseline speed above
  const BALL_VARIETY_MIN = 0.8;
  const BALL_VARIETY_MAX = 1.2;
  // ball's drawn size (o.r) is unchanged; only the collision radius shrinks to
  // 90% of what it was (0.8 -> 0.72), giving a bit more forgiveness to the player
  const BALL_HITBOX_MULT = 0.8 * 0.9;
  // average number of balls created per spawn attempt: was 0.95 (95% chance of
  // one ball), now boosted to 120% of that -> 1.14 balls per attempt on average
  const BALL_COUNT_MULT = 0.95 * 1.2;
  // at the hardest instant of each 10s difficulty cycle (spawnIntensityAt == 1,
  // i.e. t=10,20,30...) balls fly 120% of their normal speed; at the easiest
  // instant of the cycle they're back to 100%, ramping linearly in between
  const DIFF_SPEED_BOOST_MAX = 0.2;

  function spawnObject() {
    const isFruit = Math.random() < 0.128;
    const speed = 1.6 + Math.min(elapsed * 0.045, 4) + Math.random() * 1.1;
    if (isFruit) {
      const kind = FRUIT_KINDS[Math.floor(Math.random() * FRUIT_KINDS.length)];
      const hb = FRUIT_HB[kind];
      const img = fruitImg(kind);
      const iw = img.naturalWidth || 1, ih = img.naturalHeight || 1;
      const drawW = fruitVisualR / hb.rW; // fixed drawn size, same for every fruit kind
      const drawH = drawW * (ih / iw);
      const half = Math.max(drawW, drawH) / 2;
      const x = half + Math.random() * (W - 2 * half);
      objects.push({
        type: 'fruit', kind,
        x, y: H + half,
        drawW, drawH, half,
        hitR: fruitVisualR * FRUIT_HITBOX_SCALE, // collision radius, independent of drawW/drawH
        vy: -speed,
        vx: (Math.random() - 0.5) * 0.7
      });
    } else {
      // BALL_COUNT_MULT can exceed 1: spawn the whole part for sure, plus a
      // probabilistic extra ball for the fractional remainder
      let spawnCount = Math.floor(BALL_COUNT_MULT);
      if (Math.random() < BALL_COUNT_MULT - spawnCount) spawnCount++;
      const diffSpeedMult = 1 + DIFF_SPEED_BOOST_MAX * spawnIntensityAt(elapsed);
      // 시간이 갈수록 계속 빨라지는 가속(10초 주기 리셋과 무관). 50초에 1.5배(+50%).
      const timeBoost = 1 + elapsed / 100;
      for (let n = 0; n < spawnCount; n++) {
        const r = ballSize / 2;
        const x = r + Math.random() * (W - 2 * r);
        const variety = BALL_VARIETY_MIN + Math.random() * (BALL_VARIETY_MAX - BALL_VARIETY_MIN);
        objects.push({
          type: 'ball',
          x, y: H + r, r,
          vy: -speed * BALL_SPEED_MULT * variety * diffSpeedMult * timeBoost,
          vx: (Math.random() - 0.5) * 0.7,
          rot: Math.random() * Math.PI * 2,
          vrot: (Math.random() - 0.5) * 0.05
        });
      }
    }
  }

  function reset() {
    objects = [];
    particles = [];
    player.x = W / 2;
    player.facing = 'idle';
    player.animFrame = 0;
    player.animTimer = 0;
    elapsed = 0;
    spawnTimer = 0;
    grapeCount = 0;
    specialReady = false;
    clearFlash = 0;
    gotchaAnim = null;
    startTime = performance.now();
    layoutSizes();
  }

  function startGame() {
    try { window.focus(); } catch (e) {}   // iframe 임베드 시 키보드 입력 포커스 확보
    reset();
    running = true;
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    hud.classList.remove('hidden');
    controlsEl.classList.remove('hidden');
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'monsterball-start' }, '*');
    }
  }

  function gameOver() {
    running = false;
    gotchaAnim = { x: player.x, y: player.y, t: 0 };
    if (elapsed > best) best = elapsed;
    finalTime.textContent = elapsed.toFixed(1);
    finalBest.textContent = '최고 기록 ' + best.toFixed(1) + '초';
    document.getElementById('goHeading').textContent = Math.floor(elapsed) + 'G를 획득하셨습니다.';
    // let a parent page (e.g. an <iframe> embed) know how long the run lasted,
    // so it can award a reward. No-op when the game runs standalone.
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'monsterball-gameover', elapsed: elapsed }, '*');
    }
    setTimeout(() => {
      hud.classList.add('hidden');
      gameOverScreen.classList.remove('hidden');
    }, GOTCHA_DURATION);
  }

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);

  // ---------- collision helper ----------
  // approximate circle-vs-ellipse test: inflate the ellipse's radii by the
  // circle's radius (per axis) and check whether the circle's center falls inside.
  function circleEllipseCollide(cx, cy, cr, ex, ey, rx, ry) {
    const nx = (cx - ex) / (rx + cr);
    const ny = (cy - ey) / (ry + cr);
    return nx * nx + ny * ny <= 1;
  }

  // ---------- sprite / hitbox helpers ----------
  function currentSpriteInfo() {
    if (player.facing === 'idle') return { img: imgNomove, hbox: HB_NOMOVE, mirror: false };
    const img = player.animFrame === 0 ? imgRun1 : imgRun2;
    return { img, hbox: HB_RUN, mirror: player.facing === 'left' };
  }

  function updatePlayerFrameGeometry() {
    const info = currentSpriteInfo();
    const iw = info.img.naturalWidth || 1, ih = info.img.naturalHeight || 1;
    const drawH = player.targetH;
    const drawW = drawH * (iw / ih);
    player.drawW = drawW;
    player.drawH = drawH;
    player._info = info;
    const hb = info.hbox;
    const exNorm = info.mirror ? (1 - hb.exW) : hb.exW;
    return {
      ex: player.x - drawW / 2 + exNorm * drawW,
      ey: player.y - drawH / 2 + hb.eyH * drawH,
      rx: hb.rxW * drawW,
      ry: hb.ryH * drawH
    };
  }

  function drawPlayer() {
    const info = player._info;
    if (!info || !info.img.naturalWidth) return;
    const w = player.drawW, h = player.drawH;
    ctx.save();
    if (info.mirror) {
      ctx.translate(player.x, player.y);
      ctx.scale(-1, 1);
      ctx.drawImage(info.img, -w / 2, -h / 2, w, h);
    } else {
      ctx.drawImage(info.img, player.x - w / 2, player.y - h / 2, w, h);
    }
    ctx.restore();
  }

  // fruit draws below the player; balls draw above the player (so a ball
  // overlapping pikachu is always visible in front of him)
  function drawFruits() {
    for (const o of objects) {
      if (o.type !== 'fruit') continue;
      const img = fruitImg(o.kind);
      if (!img.naturalWidth) continue;
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.drawImage(img, -o.drawW / 2, -o.drawH / 2, o.drawW, o.drawH);
      ctx.restore();
    }
  }

  function drawBalls() {
    for (const o of objects) {
      if (o.type !== 'ball') continue;
      if (!imgBall.naturalWidth) continue;
      const dh = o.r * 2;
      const dw = dh * (imgBall.naturalWidth / imgBall.naturalHeight); // preserve aspect ratio
      ctx.save();
      ctx.translate(o.x, o.y);
      ctx.rotate(o.rot);
      ctx.drawImage(imgBall, -dw / 2, -dh / 2, dw, dh);
      ctx.restore();
    }
  }

  function drawBackground() {
    if (imgBg.naturalWidth) {
      ctx.drawImage(imgBg, 0, 0, W, H);
    } else {
      ctx.fillStyle = '#cfe8ff';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawGotcha(dt) {
    if (!gotchaAnim) return;
    gotchaAnim.t += dt * 16.667;
    const k = Math.min(gotchaAnim.t / GOTCHA_DURATION, 1);
    const eased = 1 - Math.pow(1 - k, 3);
    const scale = 0.15 + 1.35 * eased;
    if (!imgGotcha.naturalWidth) return;
    const baseW = W * 0.31; // 기존 크기의 50%
    const ratio = imgGotcha.naturalWidth / imgGotcha.naturalHeight;
    const baseH = baseW / ratio;
    const w = baseW * scale, h = baseH * scale;
    // 피카츄가 죽은 위치에서 팝업 (가장자리에서만 살짝 보정)
    const gx = Math.max(w / 2, Math.min(W - w / 2, gotchaAnim.x));
    const gy = Math.max(h / 2, Math.min(H - h / 2, gotchaAnim.y));
    ctx.save();
    ctx.drawImage(imgGotcha, gx - w / 2, gy - h / 2, w, h);
    ctx.restore();
  }

  // ---------- main loop ----------
  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 16.667, 3);
    last = now;

    ctx.clearRect(0, 0, W, H);
    drawBackground();

    if (running) {
      elapsed = (now - startTime) / 1000;

      // movement
      const movL = isMovingLeft();
      const movR = isMovingRight();
      let dir = 'idle';
      if (movL && !movR) { dir = 'left'; player.x -= player.speed * dt; }
      else if (movR && !movL) { dir = 'right'; player.x += player.speed * dt; }
      const margin = player.targetH * 0.55;
      player.x = Math.max(margin, Math.min(W - margin, player.x));

      if (dir !== player.facing) {
        player.facing = dir;
        player.animFrame = 0;
        player.animTimer = 0;
      }
      if (dir !== 'idle') {
        player.animTimer += dt * 16.667;
        if (player.animTimer >= ANIM_INTERVAL) {
          player.animTimer = 0;
          player.animFrame = 1 - player.animFrame;
        }
      }

      const hitEllipse = updatePlayerFrameGeometry();

      if (clearFlash > 0) clearFlash = Math.max(0, clearFlash - dt * 0.06);

      // spawn objects
      spawnTimer -= dt;
      const interval = spawnIntervalAt(elapsed);
      if (spawnTimer <= 0) {
        spawnObject();
        const intensity = spawnIntensityAt(elapsed);
        if (Math.random() < intensity * 0.4) spawnObject();
        spawnTimer = interval;
      }

      // update objects
      for (let i = objects.length - 1; i >= 0; i--) {
        const o = objects[i];
        o.x += o.vx * dt;
        o.y += o.vy * dt;
        const half = o.type === 'ball' ? o.r : o.half;
        if (o.x < half) { o.x = half; o.vx *= -1; }
        if (o.x > W - half) { o.x = W - half; o.vx *= -1; }
        if (o.type === 'ball') o.rot += o.vrot * dt;
        if (o.y < -half * 2) {
          objects.splice(i, 1);
          continue;
        }
        let hit;
        if (o.type === 'ball') {
          hit = circleEllipseCollide(o.x, o.y, o.r * BALL_HITBOX_MULT, hitEllipse.ex, hitEllipse.ey, hitEllipse.rx, hitEllipse.ry);
        } else {
          const hb = FRUIT_HB[o.kind];
          const hcx = o.x + (hb.cxW - 0.5) * o.drawW;
          const hcy = o.y + (hb.cyH - 0.5) * o.drawH;
          hit = circleEllipseCollide(hcx, hcy, o.hitR, hitEllipse.ex, hitEllipse.ey, hitEllipse.rx, hitEllipse.ry);
        }
        if (hit) {
          if (o.type === 'ball') {
            gameOver();
            break;
          } else {
            burst(o.x, o.y, FRUIT_COLOR[o.kind] || '255,214,90', 14);
            objects.splice(i, 1);
            grapeCount = Math.min(GRAPE_TARGET, grapeCount + 1);
            if (grapeCount >= GRAPE_TARGET) specialReady = true;
          }
        }
      }

      timeText.textContent = elapsed.toFixed(1);

      // special button visuals: gauge fills left-to-right while charging,
      // shifting color from blue to yellow, then clears and the button
      // pulses yellow once ready
      const chargeT = grapeCount / GRAPE_TARGET;
      const p = specialReady ? 0 : chargeT;
      cdRing.style.setProperty('--p', p.toFixed(3));
      const gr = Math.round(60 + (255 - 60) * chargeT);
      const gg = Math.round(140 + (205 - 140) * chargeT);
      const gb = Math.round(255 + (40 - 255) * chargeT);
      cdRing.style.setProperty('--gauge-color', `rgba(${gr},${gg},${gb},0.8)`);
      specialBtn.classList.toggle('ready', specialReady);
      specialMain.textContent = specialReady ? '피카피카썬더!' : '나무열매를 모으세요';
    }

    drawFruits();

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const pt = particles[i];
      pt.x += pt.vx * dt; pt.y += pt.vy * dt;
      pt.vx *= 0.96; pt.vy *= 0.96;
      pt.life -= 0.02 * dt;
      if (pt.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(pt.life, 0);
      ctx.fillStyle = `rgba(${pt.color}, 1)`;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 3 * pt.life + 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (running) drawPlayer();
    drawBalls(); // balls render above the player so overlaps read correctly
    if (gotchaAnim) drawGotcha(dt);

    if (clearFlash > 0) {
      ctx.fillStyle = `rgba(255,220,40,${clearFlash * 0.55})`;
      ctx.fillRect(0, 0, W, H);
    }

    requestAnimationFrame(loop);
  }

  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
